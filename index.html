    <script>
      // Fix for "TypeError: Cannot set property fetch of #<Window> which has only a getter"
      (function() {
        try {
          var nativeFetch = window.fetch || self.fetch || globalThis.fetch;
          function protect(obj, prop) {
            if (!obj) return;
            try {
              var desc = Object.getOwnPropertyDescriptor(obj, prop);
              if (desc && !desc.configurable) return;
              Object.defineProperty(obj, prop, {
                get: function() { return nativeFetch; },
                set: function(v) { 
                  console.warn('Blocked attempt to overwrite ' + prop); 
                  return nativeFetch;
                },
                configurable: true,
                enumerable: true
              });
            } catch (e) {}
          }
          protect(window, 'fetch');
          protect(globalThis, 'fetch');
          protect(self, 'fetch');
        } catch (err) {}
      })();
    </script>
